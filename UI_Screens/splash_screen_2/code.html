<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reflect - Register Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4e51e9",
                        "on-primary": "#ffffff",
                        "surface": "#ffffff",
                        "surface-variant": "#E7E0EC",
                        "on-surface": "#1C1B1F",
                        "on-surface-variant": "#49454F",
                        "outline": "#79747E",
                        "background-light": "#fdfcff",
                        "background-dark": "#1a1b26",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.75rem", "2xl": "2.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            min-height: max(884px, 100dvh);
        }.m3-input:focus-within label {
            color: #4e51e9;
        }
        .m3-input:focus-within {
            border-color: #4e51e9;
            border-width: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-on-surface dark:text-gray-100 flex justify-center">
<div class="relative flex h-full min-h-screen w-full max-w-md flex-col bg-background-light dark:bg-background-dark p-6">
<div class="flex flex-col items-start pt-12 pb-8">
<div class="mb-6 flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-primary to-[#7A5CFF] shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-[28px] text-white">spa</span>
</div>
<h1 class="text-[32px] font-bold tracking-tight text-on-surface dark:text-white leading-tight">
            Create account
        </h1>
<p class="mt-2 text-base font-medium text-on-surface-variant dark:text-gray-400">
            Start your journey to self-growth with Reflect.
        </p>
</div>
<form action="#" class="flex flex-col gap-5 flex-1" onsubmit="return false;">
<div class="relative">
<div class="m3-input group relative flex items-center rounded-lg border border-outline/50 bg-surface dark:bg-gray-800 dark:border-gray-600 px-4 py-3 transition-colors hover:border-on-surface-variant">
<input class="peer block w-full border-0 bg-transparent p-0 text-base text-on-surface dark:text-white placeholder-transparent focus:ring-0" id="fullname" placeholder=" " required="" type="text"/>
<label class="pointer-events-none absolute left-4 top-3 origin-[0] -translate-y-5 scale-75 transform bg-surface dark:bg-gray-800 px-1 text-sm text-outline dark:text-gray-400 duration-200 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-focus:-translate-y-5 peer-focus:scale-75 peer-focus:text-primary" for="fullname">
                    Full Name
                </label>
<span class="material-symbols-outlined absolute right-4 text-on-surface-variant dark:text-gray-400">person</span>
</div>
</div>
<div class="relative">
<div class="m3-input group relative flex items-center rounded-lg border border-outline/50 bg-surface dark:bg-gray-800 dark:border-gray-600 px-4 py-3 transition-colors hover:border-on-surface-variant">
<input class="peer block w-full border-0 bg-transparent p-0 text-base text-on-surface dark:text-white placeholder-transparent focus:ring-0" id="email" placeholder=" " required="" type="email"/>
<label class="pointer-events-none absolute left-4 top-3 origin-[0] -translate-y-5 scale-75 transform bg-surface dark:bg-gray-800 px-1 text-sm text-outline dark:text-gray-400 duration-200 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-focus:-translate-y-5 peer-focus:scale-75 peer-focus:text-primary" for="email">
                    Email
                </label>
<span class="material-symbols-outlined absolute right-4 text-on-surface-variant dark:text-gray-400">mail</span>
</div>
</div>
<div class="relative">
<div class="m3-input group relative flex items-center rounded-lg border border-outline/50 bg-surface dark:bg-gray-800 dark:border-gray-600 px-4 py-3 transition-colors hover:border-on-surface-variant">
<input class="peer block w-full border-0 bg-transparent p-0 text-base text-on-surface dark:text-white placeholder-transparent focus:ring-0" id="password" placeholder=" " required="" type="password"/>
<label class="pointer-events-none absolute left-4 top-3 origin-[0] -translate-y-5 scale-75 transform bg-surface dark:bg-gray-800 px-1 text-sm text-outline dark:text-gray-400 duration-200 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-focus:-translate-y-5 peer-focus:scale-75 peer-focus:text-primary" for="password">
                    Password
                </label>
<span class="material-symbols-outlined absolute right-4 cursor-pointer text-on-surface-variant dark:text-gray-400">visibility</span>
</div>
</div>
<div class="relative">
<div class="m3-input group relative flex items-center rounded-lg border border-outline/50 bg-surface dark:bg-gray-800 dark:border-gray-600 px-4 py-3 transition-colors hover:border-on-surface-variant">
<input class="peer block w-full border-0 bg-transparent p-0 text-base text-on-surface dark:text-white placeholder-transparent focus:ring-0" id="confirm_password" placeholder=" " required="" type="password"/>
<label class="pointer-events-none absolute left-4 top-3 origin-[0] -translate-y-5 scale-75 transform bg-surface dark:bg-gray-800 px-1 text-sm text-outline dark:text-gray-400 duration-200 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-focus:-translate-y-5 peer-focus:scale-75 peer-focus:text-primary" for="confirm_password">
                    Confirm Password
                </label>
<span class="material-symbols-outlined absolute right-4 cursor-pointer text-on-surface-variant dark:text-gray-400">visibility_off</span>
</div>
</div>
<div class="flex items-center gap-2 mt-2">
<input class="h-4 w-4 rounded border-outline/50 text-primary focus:ring-primary dark:bg-gray-800 dark:border-gray-600" id="terms" type="checkbox"/>
<label class="text-sm text-on-surface-variant dark:text-gray-400" for="terms">I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms &amp; Conditions</a></label>
</div>
<div class="mt-4">
<button class="relative w-full overflow-hidden rounded-full bg-gradient-to-r from-primary to-[#7A5CFF] py-3.5 text-center text-base font-bold text-white shadow-lg shadow-primary/30 transition-all hover:shadow-xl hover:shadow-primary/40 active:scale-[0.98]">
<span class="relative z-10">Register</span>
<div class="absolute inset-0 bg-white/20 opacity-0 transition-opacity hover:opacity-100"></div>
</button>
</div>
</form>
<div class="mt-auto flex flex-col items-center justify-center pb-8 pt-6">
<p class="text-sm font-medium text-on-surface-variant dark:text-gray-400">
            Already have an account? 
            <a class="ml-1 font-bold text-primary transition-colors hover:text-[#7A5CFF]" href="#">Log in</a>
</p>
</div>
</div>

</body></html>
