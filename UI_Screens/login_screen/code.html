<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reflect - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#4e51e9",
                "background-light": "#f6f6f8",
                "background-dark": "#111121",
              },
              fontFamily: {
                "display": ["Manrope", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Container -->
<main class="w-full max-w-[400px] flex flex-col gap-6">
<!-- Header Section -->
<header class="text-center mb-4">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-primary to-purple-600 mb-6 shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-white text-3xl">mindfulness</span>
</div>
<h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2 tracking-tight">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 text-base">Log in to continue your journey with Reflect.</p>
</header>
<!-- Login Card -->
<div class="bg-white dark:bg-[#1a1b32] p-6 sm:p-8 rounded-2xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800">
<form class="flex flex-col gap-5">
<!-- Email Field -->
<div class="relative group">
<input class="peer block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-transparent px-4 pb-2.5 pt-5 text-sm text-slate-900 dark:text-white focus:border-primary dark:focus:border-primary focus:ring-0 appearance-none h-14" id="email" placeholder=" " type="email"/>
<label class="absolute text-sm text-slate-500 dark:text-slate-400 duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-primary dark:peer-focus:text-primary pointer-events-none" for="email">
                        Email address
                    </label>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
</div>
<!-- Password Field -->
<div class="relative group">
<input class="peer block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-transparent px-4 pb-2.5 pt-5 text-sm text-slate-900 dark:text-white focus:border-primary dark:focus:border-primary focus:ring-0 appearance-none h-14" id="password" placeholder=" " type="password"/>
<label class="absolute text-sm text-slate-500 dark:text-slate-400 duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 peer-focus:text-primary dark:peer-focus:text-primary pointer-events-none" for="password">
                        Password
                    </label>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">
                        Forgot Password?
                    </a>
</div>
<!-- Login Button -->
<button class="w-full h-12 bg-gradient-to-r from-primary to-indigo-600 hover:from-indigo-600 hover:to-primary text-white font-semibold rounded-xl shadow-lg shadow-primary/25 transition-all active:scale-[0.98] flex items-center justify-center gap-2 mt-2" type="button">
<span>Log In</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex py-6 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="flex-shrink-0 mx-4 text-slate-400 text-xs uppercase font-medium tracking-wider">Or continue with</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center h-12 rounded-xl border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-white/5 transition-colors gap-3">
<!-- Google Icon placeholder using text for simplicity in this constraints, or a symbol -->

<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-200">Google</span>
</button>
<button class="flex items-center justify-center h-12 rounded-xl border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-white/5 transition-colors gap-3">
<svg class="h-5 w-5 text-slate-900 dark:text-white" fill="currentColor" viewbox="0 0 24 24">
<path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.57-.12 0-.23-.02-.3-.03-.01-.06-.04-.15-.04-.21.02-1.19.58-2.33 1.27-3.13.8-.92 2.15-1.64 3.15-1.64.02 0 .05.01.08.02.01.12.01.24.01.34Zm-1.784 4.54c-2.553-.78-4.77.27-6.223 2.96h-4.908v3.42h2.246v11.65h5.138v-11.65h3.408l.552-3.42h-3.96V6.99c0-1.07.727-1.57 1.76-1.57.51 0 1.02.13 1.47.34l.517-2.79Z"></path>
<path d="M13.633 11.23c-1.22 0-2.07.96-2.07 2.27v.06c0 1.34.86 2.27 2.1 2.27 1.25 0 2.13-.93 2.13-2.3 0-1.35-.86-2.3-2.16-2.3Zm6.39 3.07c0 1.04-.32 2.04-.84 2.87l-2.04-1.18c.27-.42.42-.9.42-1.42 0-1.1-.9-2-2-2-1.1 0-2 .9-2 2s.9 2 2 2c.4 0 .8-.13 1.1-.34l1.37 2.1c-.6.44-1.37.7-2.2.7-2.38 0-4.3-1.92-4.3-4.3s1.92-4.3 4.3-4.3c2.2 0 4.07 1.7 4.19 3.87ZM17.2 24h-3.4v-9.5h3.4v9.5Z" fill="transparent"></path>
<path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.57-.12 0-.23-.02-.3-.03-.01-.06-.04-.15-.04-.21.02-1.19.58-2.33 1.27-3.13.8-.92 2.15-1.64 3.15-1.64.02 0 .05.01.08.02.01.12.01.24.01.34Zm-2.732 5.97c-.506-.21-1.016-.34-1.526-.34-1.033 0-1.76.5-1.76 1.57v1.98h3.96l-.552 3.42h-3.408v11.65h-5.138v-11.65h-2.246v-3.42h4.908c1.453-2.69 3.67-3.74 6.223-2.96l-.46 2.75Z"></path>
</svg>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-200">Apple</span>
</button>
</div>
</div>
<!-- Register Link -->
<p class="text-center text-slate-500 dark:text-slate-400 text-sm">
            Don't have an account yet? 
            <a class="text-primary font-bold hover:underline" href="#">Register now</a>
</p>
</main>
</body></html>
