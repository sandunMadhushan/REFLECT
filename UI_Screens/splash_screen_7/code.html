<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reflect - Add New Habit</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4e51e9",
                        "primary-dark": "#3c3ed6",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111121",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1e1e30",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px" },
                },
            },
        }
    </script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            min-height: max(844px, 100dvh);
            -webkit-font-smoothing: antialiased;
        }.no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-y-auto pb-6">
<header class="sticky top-0 z-10 flex w-full items-center justify-between px-6 py-4 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md">
<button class="flex h-10 w-10 items-center justify-center rounded-full text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-[28px]">arrow_back</span>
</button>
<h1 class="text-lg font-bold text-slate-900 dark:text-white">Add New Habit</h1>
<button class="flex h-10 w-10 items-center justify-center rounded-full text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-[24px]">more_vert</span>
</button>
</header>
<main class="flex-1 w-full max-w-md mx-auto px-6 pt-4 pb-24 flex flex-col gap-8">
<div class="flex flex-col gap-3">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1" for="habit-name">Habit Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 dark:text-slate-500 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">edit</span>
</div>
<input class="w-full bg-surface-light dark:bg-surface-dark border-none rounded-xl py-4 pl-12 pr-4 text-lg font-medium text-slate-900 dark:text-white shadow-sm ring-1 ring-slate-200 dark:ring-slate-700/50 focus:ring-2 focus:ring-primary placeholder:text-slate-400 dark:placeholder:text-slate-600 transition-all outline-none" id="habit-name" placeholder="e.g. Morning Meditation" type="text"/>
</div>
</div>
<div class="flex flex-col gap-3">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Frequency</label>
<div class="grid grid-cols-3 gap-3 p-1 bg-surface-light dark:bg-surface-dark rounded-2xl ring-1 ring-slate-200 dark:ring-slate-700/50 shadow-sm">
<button class="flex flex-col items-center justify-center py-3 rounded-xl bg-primary text-white shadow-md transition-all">
<span class="text-sm font-bold">Daily</span>
</button>
<button class="flex flex-col items-center justify-center py-3 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
<span class="text-sm font-medium">Weekly</span>
</button>
<button class="flex flex-col items-center justify-center py-3 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
<span class="text-sm font-medium">Specific</span>
</button>
</div>
<div class="mt-2 flex justify-between gap-2 overflow-x-auto no-scrollbar pb-1">
<button class="h-10 w-10 shrink-0 rounded-full bg-primary text-white text-xs font-bold flex items-center justify-center shadow-sm">M</button>
<button class="h-10 w-10 shrink-0 rounded-full bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 text-xs font-bold flex items-center justify-center">T</button>
<button class="h-10 w-10 shrink-0 rounded-full bg-primary text-white text-xs font-bold flex items-center justify-center shadow-sm">W</button>
<button class="h-10 w-10 shrink-0 rounded-full bg-primary text-white text-xs font-bold flex items-center justify-center shadow-sm">T</button>
<button class="h-10 w-10 shrink-0 rounded-full bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 text-xs font-bold flex items-center justify-center">F</button>
<button class="h-10 w-10 shrink-0 rounded-full bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 text-xs font-bold flex items-center justify-center">S</button>
<button class="h-10 w-10 shrink-0 rounded-full bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 text-xs font-bold flex items-center justify-center">S</button>
</div>
</div>
<div class="flex flex-col gap-3">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1" for="goal-select">Link to Goal</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined filled">flag</span>
</div>
<select class="w-full appearance-none bg-surface-light dark:bg-surface-dark border-none rounded-xl py-4 pl-12 pr-10 text-base font-medium text-slate-900 dark:text-white shadow-sm ring-1 ring-slate-200 dark:ring-slate-700/50 focus:ring-2 focus:ring-primary outline-none transition-all" id="goal-select">
<option disabled="" selected="" value="">Select a goal...</option>
<option value="fitness">Improve Physical Fitness</option>
<option value="mindfulness">Practice Mindfulness</option>
<option value="learning">Learn a New Skill</option>
<option value="career">Career Advancement</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-500">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
<p class="text-xs text-slate-400 dark:text-slate-500 px-1">Linking a habit to a goal increases success rate by 40%.</p>
</div>
<div class="flex items-center justify-between p-4 bg-surface-light dark:bg-surface-dark rounded-xl ring-1 ring-slate-200 dark:ring-slate-700/50 shadow-sm mt-2">
<div class="flex items-center gap-3">
<div class="flex h-10 w-10 items-center justify-center rounded-full bg-orange-100 dark:bg-orange-900/30 text-orange-500 dark:text-orange-400">
<span class="material-symbols-outlined">notifications</span>
</div>
<div>
<h3 class="font-bold text-slate-900 dark:text-white text-sm">Reminders</h3>
<p class="text-xs text-slate-500 dark:text-slate-400">Get notified at 09:00 AM</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</main>
<div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark pt-12">
<button class="w-full bg-primary hover:bg-primary-dark active:scale-[0.98] text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">check</span>
            Save Habit
        </button>
</div>
</div>

</body></html>
