<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reflect - Add Reflection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4e51e9",
                        "primary-dark": "#3c3eb5",
                        "secondary": "#7A5CFF",
                        "background-light": "#f8f9fc",
                        "background-dark": "#111121",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1c1c2e",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px" },
                },
            },
        }
    </script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            min-height: max(884px, 100dvh);
        }textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
            border: 3px solid transparent;
            background-clip: content-box;
        }
        .dark textarea::-webkit-scrollbar-thumb {
            background-color: #475569;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-800 dark:text-slate-100 flex flex-col h-screen overflow-hidden">
<header class="flex-none px-6 pt-12 pb-4 flex items-center justify-between bg-surface-light dark:bg-surface-dark border-b border-slate-100 dark:border-slate-800/50">
<button class="p-2 -ml-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h1 class="text-xl font-bold tracking-tight">New Reflection</h1>
<button class="p-2 -mr-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 transition-colors">
<span class="material-symbols-outlined">more_horiz</span>
</button>
</header>
<main class="flex-1 overflow-y-auto px-6 py-6 w-full max-w-lg mx-auto flex flex-col gap-8">
<section class="flex flex-col gap-4">
<label class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">How are you feeling?</label>
<div class="flex items-center justify-between px-1">
<div class="group flex flex-col items-center gap-2 cursor-pointer">
<div class="w-14 h-14 rounded-2xl bg-orange-50 dark:bg-orange-900/20 border-2 border-transparent group-hover:border-orange-200 dark:group-hover:border-orange-700/50 flex items-center justify-center transition-all shadow-sm">
<span class="text-3xl filter drop-shadow-sm grayscale-[0.3] group-hover:grayscale-0 transition-all">😄</span>
</div>
<span class="text-xs font-medium text-slate-600 dark:text-slate-400">Happy</span>
</div>
<div class="group flex flex-col items-center gap-2 cursor-pointer">
<div class="w-14 h-14 rounded-2xl bg-indigo-50 dark:bg-indigo-900/20 border-2 border-indigo-500 flex items-center justify-center transition-all shadow-md shadow-indigo-100 dark:shadow-indigo-900/20 transform scale-105">
<span class="text-3xl">😌</span>
</div>
<span class="text-xs font-bold text-indigo-600 dark:text-indigo-400">Calm</span>
</div>
<div class="group flex flex-col items-center gap-2 cursor-pointer">
<div class="w-14 h-14 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent group-hover:border-slate-200 dark:group-hover:border-slate-700 flex items-center justify-center transition-all shadow-sm">
<span class="text-3xl filter drop-shadow-sm grayscale-[0.3] group-hover:grayscale-0 transition-all">😐</span>
</div>
<span class="text-xs font-medium text-slate-600 dark:text-slate-400">Neutral</span>
</div>
<div class="group flex flex-col items-center gap-2 cursor-pointer">
<div class="w-14 h-14 rounded-2xl bg-blue-50 dark:bg-blue-900/20 border-2 border-transparent group-hover:border-blue-200 dark:group-hover:border-blue-700/50 flex items-center justify-center transition-all shadow-sm">
<span class="text-3xl filter drop-shadow-sm grayscale-[0.3] group-hover:grayscale-0 transition-all">😔</span>
</div>
<span class="text-xs font-medium text-slate-600 dark:text-slate-400">Sad</span>
</div>
<div class="group flex flex-col items-center gap-2 cursor-pointer">
<div class="w-14 h-14 rounded-2xl bg-purple-50 dark:bg-purple-900/20 border-2 border-transparent group-hover:border-purple-200 dark:group-hover:border-purple-700/50 flex items-center justify-center transition-all shadow-sm">
<span class="text-3xl filter drop-shadow-sm grayscale-[0.3] group-hover:grayscale-0 transition-all">😰</span>
</div>
<span class="text-xs font-medium text-slate-600 dark:text-slate-400">Anxious</span>
</div>
</div>
</section>
<section class="flex flex-col gap-3">
<label class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Related Goal</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-slate-700 rounded-xl py-4 pl-4 pr-10 text-base font-medium text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-shadow cursor-pointer shadow-sm">
<option disabled="" selected="" value="">Select a goal...</option>
<option value="1">🌱 Improve mental health</option>
<option value="2">🏃‍♂️ Run a marathon</option>
<option value="3">📚 Read 12 books</option>
<option value="4">🎨 Learn watercolor painting</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</section>
<section class="flex flex-col gap-3 flex-1 min-h-[200px]">
<label class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Journal</label>
<div class="relative flex-1 flex flex-col">
<textarea class="flex-1 w-full bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-slate-700 rounded-2xl p-4 text-base leading-relaxed text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all resize-none shadow-sm" placeholder="Write your thoughts here... What went well? What challenged you?"></textarea>
</div>
</section>
<div class="h-20 flex-none"></div>
</main>
<div class="flex-none p-6 pt-4 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark backdrop-blur-[2px]">
<button class="w-full bg-gradient-to-r from-primary to-secondary hover:from-primary-dark hover:to-primary text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">check_circle</span>
            Save Reflection
        </button>
</div>

</body></html>
