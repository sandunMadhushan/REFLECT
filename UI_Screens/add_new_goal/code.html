<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reflect - Add New Goal</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4e51e9",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111121",
                        "surface-dark": "#1a1b32",
                        "border-dark": "#353664",
                        "text-secondary": "#9495c7"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<!-- Mobile Container -->
<div class="w-full max-w-md min-h-screen flex flex-col relative bg-background-light dark:bg-background-dark shadow-2xl mx-auto border-x border-slate-200 dark:border-border-dark/30">
<!-- Top App Bar -->
<header class="sticky top-0 z-50 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-b border-slate-200 dark:border-border-dark">
<div class="flex items-center px-4 py-3 justify-between h-14">
<button class="flex items-center justify-center w-10 h-10 -ml-2 rounded-full text-slate-900 dark:text-white hover:bg-slate-100 dark:hover:bg-surface-dark transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center text-slate-900 dark:text-white">New Goal</h2>
<button class="flex items-center justify-center h-10 px-2 -mr-2 rounded-lg text-text-secondary hover:text-primary transition-colors">
<span class="text-sm font-bold leading-normal tracking-[0.015em]">Cancel</span>
</button>
</div>
</header>
<!-- Form Content -->
<main class="flex-1 overflow-y-auto pb-24">
<div class="flex flex-col gap-6 px-5 py-6">
<!-- Title Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-white text-sm font-semibold leading-normal" for="title">Goal Title</label>
<input class="form-input w-full rounded-xl border border-slate-200 dark:border-border-dark bg-white dark:bg-surface-dark text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-text-secondary h-14 px-4 text-base focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="title" placeholder="e.g., Learn Spanish" type="text"/>
</div>
<!-- Description Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-white text-sm font-semibold leading-normal" for="description">Description</label>
<textarea class="form-textarea w-full rounded-xl border border-slate-200 dark:border-border-dark bg-white dark:bg-surface-dark text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-text-secondary min-h-32 px-4 py-3 text-base focus:border-primary focus:ring-1 focus:ring-primary resize-none transition-all" id="description" placeholder="Why is this goal important to you?"></textarea>
</div>
<!-- Category & Priority Group -->
<div class="grid grid-cols-1 gap-6">
<!-- Category Select -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-white text-sm font-semibold leading-normal" for="category">Category</label>
<div class="relative">
<select class="form-select w-full appearance-none rounded-xl border border-slate-200 dark:border-border-dark bg-white dark:bg-surface-dark text-slate-900 dark:text-white h-14 pl-4 pr-10 text-base focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="category">
<option disabled="" selected="" value="">Select a category</option>
<option value="personal">Personal Growth</option>
<option value="health">Health &amp; Fitness</option>
<option value="career">Career &amp; Finance</option>
<option value="relationships">Relationships</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-text-secondary">
<span class="material-symbols-outlined text-[20px]">expand_more</span>
</div>
</div>
</div>
<!-- Priority Segmented Control -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-white text-sm font-semibold leading-normal">Priority</label>
<div class="flex p-1 bg-slate-100 dark:bg-surface-dark rounded-xl border border-slate-200 dark:border-border-dark/50">
<label class="flex-1 relative cursor-pointer group">
<input class="sr-only peer" name="priority" type="radio" value="low"/>
<div class="flex items-center justify-center py-2.5 rounded-[10px] text-sm font-medium text-slate-500 dark:text-text-secondary transition-all duration-200 peer-checked:bg-white dark:peer-checked:bg-[#2a2b4a] peer-checked:text-slate-900 dark:peer-checked:text-white peer-checked:shadow-sm">
                                    Low
                                </div>
</label>
<label class="flex-1 relative cursor-pointer group">
<input checked="" class="sr-only peer" name="priority" type="radio" value="medium"/>
<div class="flex items-center justify-center py-2.5 rounded-[10px] text-sm font-medium text-slate-500 dark:text-text-secondary transition-all duration-200 peer-checked:bg-white dark:peer-checked:bg-[#2a2b4a] peer-checked:text-slate-900 dark:peer-checked:text-white peer-checked:shadow-sm">
                                    Medium
                                </div>
</label>
<label class="flex-1 relative cursor-pointer group">
<input class="sr-only peer" name="priority" type="radio" value="high"/>
<div class="flex items-center justify-center py-2.5 rounded-[10px] text-sm font-medium text-slate-500 dark:text-text-secondary transition-all duration-200 peer-checked:bg-white dark:peer-checked:bg-[#2a2b4a] peer-checked:text-slate-900 dark:peer-checked:text-white peer-checked:shadow-sm">
                                    High
                                </div>
</label>
</div>
</div>
</div>
<!-- Dates Section -->
<div class="flex gap-4">
<div class="flex-1 flex flex-col gap-2">
<label class="text-slate-900 dark:text-white text-sm font-semibold leading-normal">Start Date</label>
<div class="relative group">
<input class="form-input w-full rounded-xl border border-slate-200 dark:border-border-dark bg-white dark:bg-surface-dark text-slate-900 dark:text-white h-14 px-4 text-base focus:border-primary focus:ring-1 focus:ring-primary transition-all uppercase placeholder:normal-case [color-scheme:light] dark:[color-scheme:dark]" type="date" value="2023-10-27"/>
</div>
</div>
<div class="flex-1 flex flex-col gap-2">
<label class="text-slate-900 dark:text-white text-sm font-semibold leading-normal">Target Date</label>
<div class="relative group">
<input class="form-input w-full rounded-xl border border-slate-200 dark:border-border-dark bg-white dark:bg-surface-dark text-slate-900 dark:text-white h-14 px-4 text-base focus:border-primary focus:ring-1 focus:ring-primary transition-all uppercase placeholder:normal-case [color-scheme:light] dark:[color-scheme:dark]" type="date"/>
</div>
</div>
</div>
<!-- Reminder Toggle (Bonus for UX) -->
<div class="flex items-center justify-between py-2">
<div class="flex flex-col">
<span class="text-slate-900 dark:text-white text-base font-semibold">Reminders</span>
<span class="text-slate-500 dark:text-text-secondary text-sm">Get notified about this goal</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-surface-dark peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 w-full max-w-md bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-xl border-t border-slate-200 dark:border-border-dark p-5 pb-8 z-40">
<button class="w-full flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white rounded-xl h-14 text-base font-bold shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[20px]">check</span>
                Save Goal
            </button>
</div>
</div>
</body></html>
